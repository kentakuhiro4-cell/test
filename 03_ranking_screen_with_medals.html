<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MY JUMP+ V2.0 修正③ MYランキング検証</title>
<style>
:root{--accent:#e60012;--accent2:#6b000f;--bg:#0b0b0b;--text:#fff;--onAccent:#fff}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#050505;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
.app{max-width:430px;min-height:100vh;margin:0 auto;padding:14px 12px 82px;background:radial-gradient(circle at top left,rgba(230,0,18,.18),transparent 32%),repeating-linear-gradient(-45deg,rgba(255,255,255,.028) 0,rgba(255,255,255,.028) 2px,transparent 2px,transparent 9px),var(--bg)}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.brand{font-size:24px;font-weight:950;line-height:1}
.editToggle{min-width:78px;height:38px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:#202020;color:#fff;font-size:14px;font-weight:950}
.rankHead{min-height:64px;border-radius:18px;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.06) 0,rgba(255,255,255,.06) 2px,transparent 2px,transparent 8px),linear-gradient(135deg,var(--accent),var(--accent2) 40%,#111 96%);display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 18px;box-shadow:0 14px 34px rgba(0,0,0,.4);margin-bottom:12px}
.rankHead h1{margin:0;font-size:25px;font-weight:950}.shareBtn{min-width:82px;height:38px;border:0;border-radius:999px;background:var(--accent);color:var(--onAccent);font-size:15px;font-weight:950;box-shadow:0 0 14px rgba(230,0,18,.4)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tile{position:relative;overflow:hidden;min-height:140px;border-radius:18px;background:#151515;border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 22px rgba(0,0,0,.35)}
.tile.big{grid-column:1/-1;min-height:252px}.thumb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;font-size:22px;line-height:1.24;font-weight:950;letter-spacing:.03em;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 2px,transparent 2px,transparent 9px),linear-gradient(135deg,#292929,#111)}
.big .thumb{font-size:36px}.thumb.red{background:linear-gradient(135deg,#4a0008,#e60012,#111)}.thumb.blue{background:linear-gradient(135deg,#07162c,#165eb5,#111)}.thumb.green{background:linear-gradient(135deg,#061b0e,#17965b,#111)}.thumb.pink{background:linear-gradient(135deg,#3c0617,#ff4f87,#111)}.thumb.navy{background:linear-gradient(135deg,#061327,#0ea5e9,#050505)}
.titleGrad{position:absolute;left:0;right:0;bottom:0;padding:36px 10px 11px;background:linear-gradient(transparent,rgba(0,0,0,.92));font-size:15px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:3}.big .titleGrad{padding:54px 16px 15px;font-size:24px}
.medalImg{position:absolute;z-index:8;object-fit:contain;filter:drop-shadow(0 8px 12px rgba(0,0,0,.65));pointer-events:none}.tile.big .medalImg{width:128px;height:128px;top:10px;left:10px}.tile:not(.big) .medalImg{width:78px;height:78px;top:8px;left:8px}
.editBar{position:absolute;top:10px;right:10px;z-index:10;display:flex;gap:5px;opacity:0;pointer-events:none;transition:.15s}body.editing .editBar{opacity:1;pointer-events:auto}
.editBtn{width:33px;height:33px;border:0;border-radius:10px;background:rgba(0,0,0,.68);color:#fff;font-size:17px;font-weight:950;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}.editBtn.up{color:#ff4b5d}.editBtn.down{color:#4db7ff}.editBtn.del{font-size:21px}
.bottomNav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;z-index:50;padding:6px 14px calc(6px + env(safe-area-inset-bottom));background:rgba(14,14,14,.94);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.12);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.navItem{position:relative;height:48px;border:0;background:transparent;color:#8e8e8e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-weight:780;font-size:11px}.navItem svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.1;fill:none}.navItem.center{color:var(--accent)}.navItem.center::before{content:"";position:absolute;top:0;width:38px;height:3px;border-radius:999px;background:var(--accent);box-shadow:0 0 10px rgba(230,0,18,.55)}
.overlay{position:fixed;inset:0;z-index:80;display:none;align-items:flex-start;justify-content:center;padding:16px 12px calc(16px + env(safe-area-inset-bottom));overflow:auto;background:rgba(0,0,0,.76)}.overlay.show{display:flex}
.shareCard{width:100%;max-width:430px;padding:16px;border-radius:26px;background:radial-gradient(circle at top,rgba(230,0,18,.18),transparent 26%),#111;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 70px rgba(0,0,0,.66)}
.shareCard h2{margin:0 0 6px;text-align:center;font-size:27px;font-weight:950}.shareCard p{margin:0 0 13px;text-align:center;color:#bbb;font-size:13px;font-weight:850}.previewBox{border-radius:18px;overflow:hidden;background:#050505;border:1px solid rgba(255,255,255,.1)}.previewBox img{display:block;width:100%;height:auto}
.shareActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.actionBtn{min-height:48px;border:0;border-radius:14px;background:#252525;color:#fff;font-size:15px;font-weight:950}.actionBtn.primary{grid-column:1/-1;background:var(--accent);color:var(--onAccent)}.close{width:100%;height:42px;border:0;background:transparent;color:#aaa;font-weight:900;margin-top:6px}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand">MY JUMP+</div><button class="editToggle" id="editToggle">編集</button></div>
  <section class="rankHead"><h1>MYランキング</h1><button class="shareBtn" id="shareBtn">シェア</button></section>
  <main class="grid" id="grid"></main>
</div>
<nav class="bottomNav">
  <button class="navItem"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18h1.5a2 2 0 0 0 1.4-3.4l-.4-.4a1.9 1.9 0 0 1 1.4-3.2H17a4 4 0 0 0 0-8h-1.2A8.8 8.8 0 0 0 12 3z"/><circle cx="7.5" cy="10" r="1"/><circle cx="10.5" cy="7.5" r="1"/><circle cx="13.5" cy="7.5" r="1"/></svg><span>テーマ</span></button>
  <button class="navItem center"><svg viewBox="0 0 24 24"><path d="M4 5.5c2.5-1 5-.8 8 1v13c-3-1.8-5.5-2-8-1V5.5z"/><path d="M20 5.5c-2.5-1-5-.8-8 1v13c3-1.8 5.5-2 8-1V5.5z"/></svg><span>本棚へ</span></button>
  <button class="navItem"><svg viewBox="0 0 24 24"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 15V3"/><path d="M7 8l5-5 5 5"/></svg><span>シェア</span></button>
</nav>
<div class="overlay" id="overlay">
  <div class="shareCard"><h2>シェア画像完成！</h2><p>メダル付きMYランキングをSNSへ。</p><div class="previewBox"><img id="shareImg" alt="share preview"></div><div class="shareActions"><button class="actionBtn primary">SNSへ投稿</button><button class="actionBtn">画像を保存</button><button class="actionBtn">別の本棚をシェア</button></div><button class="close" id="closeBtn">閉じる</button></div>
</div>
<script>
let editing=false;
let items=[{title:"ルリドラゴン",cls:"pink"},{title:"サンキューピッチ",cls:"blue"},{title:"ドラマクイン",cls:"red"},{title:"ゴーストフィクサーズ",cls:"navy"},{title:"ダンダダン",cls:"green"}];
const MEDALS=["assets/medals/medal_01.png","assets/medals/medal_02.png","assets/medals/medal_03.png","assets/medals/medal_04.png","assets/medals/medal_05.png"];
const grid=document.getElementById("grid");
function render(){grid.innerHTML=items.map((it,i)=>`<article class="tile ${i===0?'big':''}"><div class="thumb ${it.cls}">${it.title}</div><img class="medalImg" src="${MEDALS[i]}" alt="${i+1}位メダル"><div class="editBar"><button class="editBtn thumbBtn">🎨</button><button class="editBtn up" data-act="up" data-i="${i}">↑</button><button class="editBtn down" data-act="down" data-i="${i}">↓</button><button class="editBtn del" data-act="del" data-i="${i}">×</button></div><div class="titleGrad">${it.title}</div></article>`).join("");
document.querySelectorAll(".editBtn[data-act]").forEach(btn=>{btn.onclick=e=>{e.stopPropagation();const i=Number(btn.dataset.i),act=btn.dataset.act;if(act==="up"&&i>0)[items[i-1],items[i]]=[items[i],items[i-1]];if(act==="down"&&i<items.length-1)[items[i+1],items[i]]=[items[i],items[i+1]];if(act==="del")items.splice(i,1);render();};});
document.querySelectorAll(".thumbBtn").forEach(btn=>btn.onclick=e=>{e.stopPropagation();alert("本実装ではサムネ画像を変更します");});}
function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function loadImage(src){return new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});}
async function generateShare(){const W=1080,H=1350,c=document.createElement("canvas"),ctx=c.getContext("2d");c.width=W;c.height=H;ctx.fillStyle="#080808";ctx.fillRect(0,0,W,H);let bg=ctx.createRadialGradient(W/2,0,20,W/2,0,800);bg.addColorStop(0,"rgba(230,0,18,.22)");bg.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);round(ctx,42,42,W-84,H-84,34);ctx.fillStyle="#111";ctx.fill();ctx.strokeStyle="rgba(255,255,255,.09)";ctx.lineWidth=2;ctx.stroke();round(ctx,72,72,W-144,88,20);ctx.fillStyle="#e60012";ctx.fill();ctx.fillStyle="#fff";ctx.font="900 44px sans-serif";ctx.textAlign="left";ctx.fillText("MYランキング",108,130);
const imgs=await Promise.all(MEDALS.map(loadImage));let y=200,gap=24;items.slice(0,5).forEach((it,i)=>{let r=i+1,big=r===1,x=92,w=W-184,h=big?300:210;if(!big){w=(W-184-gap)/2;x=92+((i-1)%2)*(w+gap);if((i-1)%2===0&&i>1)y+=210+gap}round(ctx,x,y,w,h,18);ctx.fillStyle="#151515";ctx.fill();ctx.save();ctx.clip();let g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,r===1?"#4a0008":r===2?"#07162c":r===3?"#4a0008":r===4?"#3c0617":"#061327");g.addColorStop(.55,r===1?"#e60012":r===2?"#165eb5":r===3?"#e60012":r===4?"#ff4f87":"#1688ff");g.addColorStop(1,"#050505");ctx.fillStyle=g;ctx.fillRect(x,y,w,h);ctx.fillStyle="#fff";ctx.textAlign="center";ctx.font=`900 ${big?42:26}px sans-serif`;ctx.fillText(it.title,x+w/2,y+h/2);let fade=ctx.createLinearGradient(x,y+h*.45,x,y+h);fade.addColorStop(0,"rgba(0,0,0,0)");fade.addColorStop(1,"rgba(0,0,0,.92)");ctx.fillStyle=fade;ctx.fillRect(x,y,w,h);ctx.fillStyle="#fff";ctx.textAlign="left";ctx.font=`900 ${big?30:22}px sans-serif`;ctx.fillText(it.title,x+20,y+h-20);if(imgs[i])ctx.drawImage(imgs[i],x+(big?8:7),y+(big?8:7),big?156:96,big?156:96);ctx.restore();if(big)y+=h+gap;});
ctx.fillStyle="#e60012";ctx.font="900 50px sans-serif";ctx.textAlign="right";ctx.fillText("MY JUMP+",W-92,H-118);document.getElementById("shareImg").src=c.toDataURL("image/png");document.getElementById("overlay").classList.add("show");}
document.getElementById("editToggle").onclick=()=>{editing=!editing;document.body.classList.toggle("editing",editing);document.getElementById("editToggle").textContent=editing?"完了":"編集";};
document.getElementById("shareBtn").onclick=generateShare;document.getElementById("closeBtn").onclick=()=>document.getElementById("overlay").classList.remove("show");render();
</script>
</body></html>
