<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MY JUMP+ 作品追加画面 検証</title>
<style>
:root{
  --accent:#e60012;
  --accent2:#6b000f;
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1f1f1f;
  --line:#303030;
  --text:#fff;
  --muted:#aaa;
  --onAccent:#fff;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#050505;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
}
.app{
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  padding:18px 14px 90px;
  background:
    radial-gradient(circle at top left,rgba(230,0,18,.22),transparent 34%),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.032) 0,rgba(255,255,255,.032) 2px,transparent 2px,transparent 9px),
    var(--bg);
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.brand{
  font-size:29px;
  line-height:1;
  font-weight:950;
}
.sub{
  margin-top:5px;
  color:#cfcfcf;
  font-size:12px;
  font-weight:850;
}
.addCard{
  background:#101010;
  border:1px solid rgba(255,255,255,.1);
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 22px 55px rgba(0,0,0,.55);
}
.cardHead{
  padding:20px 18px 14px;
  background:
    repeating-linear-gradient(-45deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 2px,transparent 2px,transparent 8px),
    linear-gradient(135deg,var(--accent),var(--accent2) 32%,#111 92%);
}
.cardHead h1{
  margin:0;
  font-size:26px;
  line-height:1.15;
  font-weight:950;
}
.cardBody{
  padding:16px;
}
.modeTabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}
.modeBtn{
  min-height:42px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  background:#202020;
  color:#aaa;
  font-size:14px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.modeBtn.active{
  background:var(--accent);
  color:var(--onAccent);
  border-color:var(--accent);
  box-shadow:0 0 16px rgba(230,0,18,.32);
}
.section{
  border-top:1px solid rgba(255,255,255,.08);
  padding-top:16px;
  margin-top:16px;
}
.section:first-of-type{
  border-top:0;
  padding-top:0;
  margin-top:0;
}
.searchHero{
  border-radius:18px;
  padding:14px;
  background:
    radial-gradient(circle at top left,rgba(255,255,255,.18),transparent 34%),
    linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 18px rgba(230,0,18,.22);
}
.label{
  margin:0 0 9px;
  font-size:15px;
  font-weight:950;
  color:#fff;
}
.searchHero input{
  width:100%;
  height:48px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.32);
  color:#fff;
  padding:0 13px;
  font-size:16px;
  font-weight:900;
  outline:none;
}
.searchHero input::placeholder{
  color:rgba(255,255,255,.72);
}
.suggestions{
  display:none;
  margin-top:8px;
  overflow:hidden;
  border-radius:14px;
  background:rgba(10,10,10,.92);
  border:1px solid rgba(255,255,255,.14);
}
.suggestions.show{display:block}
.suggestion{
  padding:12px;
  font-size:14px;
  font-weight:900;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.suggestion:last-child{border-bottom:0}
.suggestion span{
  color:var(--accent);
  margin-right:7px;
}
.fileBtn{
  width:100%;
  min-height:48px;
  border:1px solid rgba(255,255,255,.13);
  border-radius:14px;
  background:#222;
  color:#fff;
  font-size:15px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.preview{
  margin-top:10px;
  min-height:145px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
  background:
    repeating-linear-gradient(-45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 2px,transparent 2px,transparent 9px),
    linear-gradient(135deg,#2a2a2a,#111);
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:18px;
  color:#fff;
  font-size:20px;
  line-height:1.25;
  font-weight:950;
}
.preview.hasImage{
  color:transparent;
}
.sizeToggle{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.sizeBtn{
  min-height:48px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  background:#202020;
  color:#aaa;
  font-size:16px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.sizeBtn.active{
  color:var(--onAccent);
  background:var(--accent);
  border-color:var(--accent);
  box-shadow:0 0 16px rgba(230,0,18,.26);
}
.manualFields{
  display:none;
}
.manualFields.show{
  display:block;
}
.fieldGrid{
  display:grid;
  gap:10px;
}
.field{
  display:grid;
  gap:6px;
}
.field label{
  color:#ddd;
  font-size:13px;
  font-weight:950;
}
.field input{
  width:100%;
  height:44px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.12);
  background:#1c1c1c;
  color:#fff;
  padding:0 11px;
  font-size:14px;
  font-weight:850;
  outline:none;
}
.saveBar{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:rgba(12,12,12,.94);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.12);
}
.saveBtn{
  width:100%;
  min-height:54px;
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--onAccent);
  font-size:18px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  box-shadow:0 0 18px rgba(230,0,18,.3);
}
.sheetOverlay{
  position:fixed;
  inset:0;
  z-index:50;
  display:none;
  align-items:flex-end;
  background:rgba(0,0,0,.64);
}
.sheetOverlay.show{display:flex}
.sheet{
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:20px 18px calc(18px + env(safe-area-inset-bottom));
  border-radius:24px 24px 0 0;
  background:#111;
  border-top:1px solid rgba(255,255,255,.12);
  box-shadow:0 -24px 65px rgba(0,0,0,.6);
}
.sheet h2{
  margin:0 0 10px;
  font-size:23px;
  font-weight:950;
}
.sheet p{
  margin:0 0 16px;
  color:#ddd;
  line-height:1.65;
  font-size:15px;
  font-weight:850;
}
.sheetBtns{
  display:grid;
  gap:10px;
}
.sheetBtn{
  min-height:50px;
  border:0;
  border-radius:15px;
  background:#262626;
  color:#fff;
  font-size:16px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.sheetBtn.primary{
  background:var(--accent);
  color:var(--onAccent);
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div>
      <div class="brand">MY JUMP+</div>
      <div class="sub">V2.0 修正② 作品追加画面</div>
    </div>
  </header>

  <section class="addCard">
    <div class="cardHead">
      <h1 id="screenTitle">作品追加してみよう！</h1>
    </div>

    <div class="cardBody">
      <div class="modeTabs">
        <button class="modeBtn active" id="serialModeBtn">連載作品</button>
        <button class="modeBtn" id="oneshotModeBtn">読切作品</button>
      </div>

      <div class="section" id="presetSection">
        <div class="searchHero">
          <p class="label">作品を探す</p>
          <input id="presetInput" placeholder="作品名を入力">
          <div class="suggestions" id="suggestions"></div>
        </div>
      </div>

      <div class="manualFields" id="manualFields">
        <div class="section">
          <div class="fieldGrid">
            <div class="field">
              <label>作品名</label>
              <input id="manualTitle" placeholder="作品名を入力">
            </div>
            <div class="field">
              <label>URL</label>
              <input id="manualUrl" placeholder="https://...">
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="label">推しコマを設定しよう！</p>
        <button class="fileBtn" id="fileBtn">画像を選択</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <div class="preview" id="preview">サムネプレビュー</div>
      </div>

      <div class="section">
        <p class="label">タイルサイズ</p>
        <div class="sizeToggle">
          <button class="sizeBtn active" data-size="small">小</button>
          <button class="sizeBtn" data-size="big">大</button>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="saveBar">
  <button class="saveBtn" id="saveBtn">保存</button>
</div>

<div class="sheetOverlay" id="rankSheet">
  <div class="sheet">
    <h2 id="sheetTitle">作品を追加しました！</h2>
    <p>MYランキングにも追加しますか？</p>
    <div class="sheetBtns">
      <button class="sheetBtn primary">MYランキングにも追加</button>
      <button class="sheetBtn" id="closeSheet">閉じる</button>
    </div>
  </div>
</div>

<script>
const presets = [
  {day:"月", title:"ルリドラゴン"},
  {day:"月", title:"ドラマクイン"},
  {day:"火", title:"サンキューピッチ"},
  {day:"水", title:"ダンダダン"},
  {day:"金", title:"ゴーストフィクサーズ"},
  {day:"日", title:"ガチャンキイ"}
];

let mode = "serial";
let selectedTitle = "";
let selectedSize = "small";

const serialModeBtn = document.getElementById("serialModeBtn");
const oneshotModeBtn = document.getElementById("oneshotModeBtn");
const presetSection = document.getElementById("presetSection");
const manualFields = document.getElementById("manualFields");
const screenTitle = document.getElementById("screenTitle");
const presetInput = document.getElementById("presetInput");
const suggestions = document.getElementById("suggestions");
const preview = document.getElementById("preview");

function setMode(next){
  mode = next;
  serialModeBtn.classList.toggle("active", mode === "serial");
  oneshotModeBtn.classList.toggle("active", mode === "oneshot");
  presetSection.style.display = mode === "serial" ? "block" : "none";
  manualFields.classList.toggle("show", mode === "oneshot");
  screenTitle.textContent = mode === "serial" ? "作品追加してみよう！" : "読切作品を追加";
  preview.textContent = mode === "serial" ? (selectedTitle || "サムネプレビュー") : "サムネプレビュー";
}

function renderSuggestions(){
  const q = presetInput.value.trim().toLowerCase();
  const list = q ? presets.filter(p => p.title.toLowerCase().includes(q)).slice(0, 6) : [];
  suggestions.innerHTML = list.map((p,i)=>`<div class="suggestion" data-i="${i}"><span>${p.day}</span>${p.title}</div>`).join("");
  suggestions.classList.toggle("show", list.length > 0);
  [...suggestions.children].forEach((el,i)=>{
    el.onclick = () => {
      const p = list[i];
      selectedTitle = p.title;
      presetInput.value = p.title;
      preview.textContent = p.title;
      suggestions.classList.remove("show");
    };
  });
}

serialModeBtn.onclick = () => setMode("serial");
oneshotModeBtn.onclick = () => setMode("oneshot");
presetInput.oninput = renderSuggestions;

document.querySelectorAll(".sizeBtn").forEach(btn=>{
  btn.onclick = () => {
    selectedSize = btn.dataset.size;
    document.querySelectorAll(".sizeBtn").forEach(b=>b.classList.toggle("active", b === btn));
  };
});

document.getElementById("fileBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e => {
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    preview.style.backgroundImage = `url('${ev.target.result}')`;
    preview.classList.add("hasImage");
  };
  reader.readAsDataURL(file);
};

document.getElementById("saveBtn").onclick = () => {
  document.getElementById("sheetTitle").textContent = mode === "serial" ? "作品を追加しました！" : "読切作品を追加しました！";
  document.getElementById("rankSheet").classList.add("show");
};

document.getElementById("closeSheet").onclick = () => document.getElementById("rankSheet").classList.remove("show");
</script>

</body>
</html>
